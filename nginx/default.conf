server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────────
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # ── Security headers ────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP – Vditor-compatible. To allow remote images, append `https:` to img-src.
    # Vditor injects inline <script> nodes from some lazy-loaded plugins (e.g. mermaid bootstrap).
    # We allow 'unsafe-inline' for scripts as a compatibility concession; XSS prevention still
    # relies on DOMPurify sanitization inside the app + same-origin restriction.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # ── Cache policy ────────────────────────────────────────────
    # Vite's hashed assets are content-addressed, safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Vditor lazy plugin assets — also content-addressed by version in package.json.
    location /vditor/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # index.html: never cache; redeploy must be instantly visible.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        # Security headers must be re-declared inside location blocks that add their own headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Vditor injects inline <script> nodes from some lazy-loaded plugins (e.g. mermaid bootstrap).
    # We allow 'unsafe-inline' for scripts as a compatibility concession; XSS prevention still
    # relies on DOMPurify sanitization inside the app + same-origin restriction.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # SPA fallback (single-page app — no router yet, but future-proof)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
