services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inkmo:0.1.0
    container_name: inkmo
    restart: unless-stopped
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 3s
      retries: 3
